<!DOCTYPE html>
<html>
<head>
  <title>Love ❤️</title>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background: linear-gradient(45deg,#ff9a9e,#fad0c4);
      text-align:center;
    }

    .box{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    button{
      padding:12px 25px;
      border:none;
      background:#ff4d6d;
      color:white;
      border-radius:10px;
      font-size:16px;
    }

    .content{
      display:none;
      padding:20px;
    }

    img{
      width:90%;
      max-width:350px;
      border-radius:20px;
      margin:10px;
    }

    p{
      font-size:18px;
    }
  </style>
</head>

<body>

  <!-- البداية -->
  <div class="box" id="start">
    <button onclick="showContent()">Click ❤️</button>
  </div>

  <!-- المحتوى -->
  <div class="content" id="content">

    <h2>💖 رسالة ليكي</h2>

    <p>
      أنا بحبك جدًا ❤️  
      وإنتي أهم حد في حياتي 💕
    </p>

    <!-- صورة واحدة فقط -->
    <img src="IMG_3622.png">

  </div>

  <script>
    function showContent(){
      document.getElementById('start').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      window.scrollTo(0,0);
    }
  </script>

</body>
</html>
