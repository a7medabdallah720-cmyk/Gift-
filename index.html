<!DOCTYPE html>
<html>
<head>
  <title>My Love Page ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(45deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .heart {
      font-size: 50px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }

    p {
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="heart">❤️</div>

    <h2>I Love You</h2>

    <p>This page is made just for you 💕</p>

    <!-- صورة -->
    <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7" />

    <p>Every moment with you is special ✨</p>

    <button onclick="alert('❤️ I love you so much')">Click Me</button>

  </div>
</body>
</html>
