<!DOCTYPE html>
<html>
<head>
  <title>Romantic Heart ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(45deg, #ff9a9e, #fad0c4);
      font-family: Arial;
    }

    .box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .heart {
      font-size: 70px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="heart">❤️</div>
    <h1>I Love You</h1>
    <p>This page is made just for you 💕</p>
    <button onclick="alert('❤️ I Love You')">Click Me</button>
  </div>
</body>
</html>
